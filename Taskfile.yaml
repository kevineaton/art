# https://taskfile.dev

version: '3'

tasks:  
  default:
    cmds:
      - task help

  vendor:
    cmds:
      - go mod tidy
      - go mod vendor

  build:
    desc: Tidy the dependencies and build the binary
    cmds:
      - go mod tidy
      - go build .
  
  go-dep-update:
    cmds: 
      - go get -u ./...
      - task vendor
  
  go-dep-update-list:
    cmds:
      - go list -u -mod=mod -m all 2>/dev/null | grep '\['

  help:
    desc: Build and display the help output
    deps: [ build ]
    cmds:
      - ./art --help
  
  clean-output:
    desc: Clean out the output
    cmds:
      - rm -f ./output/*.jpg
      - rm -f ./output/*.png